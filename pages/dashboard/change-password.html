<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password</title>
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../../styles/layout-dashboard.css" />
    <link rel="stylesheet" href="../../styles/change-password.css" />
  </head>
  <body>
    <header class="header-dekstop">
      <div>
        <div class="title">
          <img src="../../assets/icons/logo.svg" alt="" />
          <span>E-Wallet</span>
        </div>
      </div>
      <div class="container-profile-dropdown">
        <div class="profile-container">
          <h1 class="username">Ghaluh Wizard</h1>
          <div class="avatar-image">
            <img src="../../assets/images/dummy-profile-picture.png" />
          </div>
        </div>
        <button class="btn-dropdown">
          <img src="../../assets/icons/arrow-dropdown.svg" />
        </button>
      </div>
    </header>

    <div class="header-mobile text-dashboardv4">
      <div>
        <p>Profile</p>
      </div>
    </div>

    <aside class="sidebar">
      <nav class="navigation-bar">
        <ul>
          <li class="nav-item">
            <a href="./mainv1.html">
              <img src="../../assets/icons/dashboard-two.svg" alt="Dashboard" />
              <span>Dashboard</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="./transfer.html">
              <img src="../../assets/icons/Send.svg" alt="Transfer" />
              <span>Transfer</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="./history-transaction.html">
              <img src="../../assets/icons/history.svg" alt="History" />
              <span>History</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="./top-up.html">
              <img src="../../assets/icons/Upload.svg" alt="Top Up" />
              <span>Top Up</span>
            </a>
          </li>
          <li class="nav-item active">
            <a href="./edit-profile.html">
              <img src="../../assets/icons/2 User.svg" alt="Profile" />
              <span>Profile</span>
            </a>
          </li>
          <li class="nav-item logout">
            <a href="../auth/login.html">
              <img src="../../assets/icons/Log Out.svg" alt="Keluar" />
              <span>Keluar</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>
    <main>
      <section class="profile-wrapper">
        <div class="profile-page-title">
          <img src="../../assets/icons/2 Use-blue.svg" alt="Profile Icon" />
          <h2>Profile</h2>
        </div>

        <div class="card-change-password">
          <h3 class="heading-1">Change Password</h3>

          <div class="form-layout">
            <div class="container-auth">
              <label class="label-input-auth base" for="existing-password"
                >Existing Password</label
              >
              <div class="container-input-auth">
                <img src="../../assets/icons/password.svg" />
                <input
                  id="existing-password"
                  class="input-auth"
                  type="password"
                  placeholder="Enter Your Existing Password"
                />
                <img src="../../assets/icons/eye-off.svg" />
              </div>
            </div>

            <div class="container-auth">
              <label class="label-input-auth base" for="new-password"
                >New Password</label
              >
              <div class="container-input-auth">
                <img src="../../assets/icons/password.svg" />
                <input
                  id="new-password"
                  class="input-auth"
                  type="password"
                  placeholder="Enter Your New Password"
                />
                <img src="../../assets/icons/eye-off.svg" />
              </div>
            </div>

            <div class="container-auth">
              <label class="label-input-auth base" for="confirm-new-password"
                >Confirm New Password</label
              >
              <div class="container-input-auth">
                <img src="../../assets/icons/password.svg" />
                <input
                  id="confirm-new-password"
                  class="input-auth"
                  type="password"
                  placeholder="Re-Type Your New Password"
                />
                <img src="../../assets/icons/eye-off.svg" />
              </div>
            </div>

            <button type="button" class="btn-blue btn-sizing">Submit</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
