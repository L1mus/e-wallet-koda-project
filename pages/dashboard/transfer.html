<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transfer</title>
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../../styles/layout-dashboard.css" />
    <link rel="stylesheet" href="../../styles/transfer.css" />
  </head>
  <body>
    <header class="header-dekstop">
      <div>
        <div class="title">
          <img src="../../assets/icons/logo.svg" alt="" />
          <span>E-Wallet</span>
        </div>
      </div>
      <div class="container-profile-dropdown">
        <div class="profile-container">
          <h1 class="username">Ghaluh Wizard</h1>
          <div class="avatar-image">
            <img src="../../assets/images/dummy-profile-picture.png" />
          </div>
        </div>
        <button class="btn-dropdown">
          <img src="../../assets/icons/arrow-dropdown.svg" />
        </button>
      </div>
    </header>
    <div class="header-mobile">
      <div class="avatar-image">
        <img src="../../assets/images/dummy-profile-picture.png" />
      </div>
      <div>
        <p>Hello,</p>
        <h1 class="username">Ghaluh Wizard</h1>
      </div>
    </div>

    <aside class="sidebar">
      <nav class="navigation-bar">
        <ul>
          <li class="nav-item">
            <img src="../../assets/icons/dashboard-two.svg" alt="" />
            <span>Dashboard</span>
          </li>
          <li class="nav-item active">
            <img src="../../assets/icons/Send.svg" alt="" />
            <span>Transfer</span>
          </li>
          <li class="nav-item">
            <img src="../../assets/icons/history.svg" alt="" />
            <span>History</span>
          </li>
          <li class="nav-item">
            <img src="../../assets/icons/Upload.svg" alt="" />
            <span>Top Up</span>
          </li>
          <li class="nav-item">
            <img src="../../assets/icons/2 User.svg" alt="" />
            <span>Profile</span>
          </li>
          <li class="nav-item logout">
            <img src="../../assets/icons/Log Out.svg" alt="" />
            <span>Log out</span>
          </li>
        </ul>
      </nav>
    </aside>

    <main>
      <section class="transfer-wrapper">
        <div class="transfer-page-title">
          <img src="../../assets/icons/Send-blue.svg" />
          <h2>Transfer Money</h2>
        </div>

        <div class="stepper">
          <div class="step active">
            <span class="step-number">1</span>
            <span class="step-label">Find People</span>
          </div>
          <span class="step-divider"></span>
          <div class="step">
            <span class="step-number">2</span>
            <span class="step-label">Set Nominal</span>
          </div>
          <span class="step-divider"></span>
          <div class="step">
            <span class="step-number">3</span>
            <span class="step-label">Finish</span>
          </div>
        </div>

        <div class="card-find-people">
          <div class="find-people-header">
            <div class="find-people-info">
              <h3>Find People</h3>
              <p class="result-count">8 Result Found For Ghaluh</p>
            </div>
            <div class="container-input-search">
              <input
                class="input-search"
                type="text"
                placeholder="Enter Number Or Full Name"
              />
              <img src="../../assets/icons/search.svg" />
            </div>
          </div>
          <ul class="people-list">
            <li class="people-item">
              <div class="people-avatar">
                <img src="../../assets/images/dummy-user1.png" />
              </div>
              <div class="people-info">
                <h3 class="people-name">Ghaluh 1</h3>
                <p class="people-phone">(239) 555-0108</p>
              </div>
              <button class="btn-favorite">
                <img src="../../assets/icons/star.svg" />
              </button>
            </li>
          </ul>
        </div>
      </section>
    </main>
  </body>
</html>
