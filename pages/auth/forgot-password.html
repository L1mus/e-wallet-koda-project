<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../../styles/forgot-password.css" />
  </head>
  <body>
    <main>
      <header>
        <img src="../../assets/icons/logo.svg" alt="Logo" />
        <h1 class="title">E-Wallet</h1>
      </header>
      <h1 class="heading-1">Hello Welcome Back 👋</h1>
      <p>We will send new password to your email</p>
      <form class="form-layout" action="">
        <div class="container-auth">
          <label class="label-input-auth base" for="">Email</label>
          <div class="container-input-auth">
            <img src="../../assets/icons/mail.svg" alt="icon email" />
            <input
              class="input-auth"
              type="email"
              placeholder="Enter Your Email"
            />
          </div>
        </div>
        <button class="btn-blue btn-sizing">Submit</button>
      </form>
    </main>
  </body>
</html>
