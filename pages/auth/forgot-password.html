<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../../styles/forgot-password.css" />
  </head>
  <body>
    <div class="card">
      <header>
        <img src="../../assets/icons/logo.svg" alt="Logo" />
        <span class="title">E-Wallet</span>
      </header>
      <main>
        <h1 class="heading-1">Hello Welcome Back 👋</h1>
        <p>We will send new password to your email</p>
        <form class="form-layout" action="">
          <div class="container-auth">
            <label class="label-input-auth base" for="forgot-email"
              >Email</label
            >
            <div class="container-input-auth">
              <img src="../../assets/icons/mail.svg" alt="icon email" />
              <input
                id="forgot-email"
                class="input-auth"
                type="email"
                placeholder="Enter Your Email"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn-blue btn-sizing">Submit</button>
        </form>
      </main>
    </div>
  </body>
</html>
