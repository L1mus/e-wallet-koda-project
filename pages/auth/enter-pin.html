  <body>
    <div class="left-side">
      <header>
        <img src="../../assets/icons/logo.svg" alt="Logo" />

            <input

            />
            <input
              type="text"

              maxlength="1"
              pattern="[0-9]*"
            />
            <input
              type="text"

              maxlength="1"
              pattern="[0-9]*"
            />
            <input
              type="text"
              inputmode="numeric"
              maxlength="1"
              pattern="[0-9]*"
            />
          </div>
          <button class="btn-blue btn-sizing">Register</button>
        </form>
        <p>
          Forgot Your Pin? <span class="text-reset"><a href="#">Reset</a></span>
        </p>
      </main>
    </div>
    <div class="right-side">
      <picture>
        <img
          src="../../assets/images/dekstop-enter-pin-picture.png"
