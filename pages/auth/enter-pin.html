<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../../styles/enter-pin.css" />
  </head>
  <body>
    <div class="left-side">
      <header>
        <img src="../../assets/icons/logo.svg" alt="Logo" />
        <span class="title">E-Wallet</span>
      </header>
      <main>
        <h1 class="heading-1">Enter Your Pin 👋</h1>
        <p>Please save your pin because this so important.</p>
        <form class="form-layout" action="">
          <div class="container-input-pin">
            <input
              type="text"
              inputmode="numeric"
              maxlength="1"
              pattern="[0-9]*"
              autocomplete="off"
            />
            <input
              type="text"
              inputmode="numeric"
              maxlength="1"
              pattern="[0-9]*"
              autocomplete="off"
            />
            <input
              type="text"
              inputmode="numeric"
              maxlength="1"
              pattern="[0-9]*"
              autocomplete="off"
            />
            <input
              type="text"
              inputmode="numeric"
              maxlength="1"
              pattern="[0-9]*"
              autocomplete="off"
            />
            <input
              type="text"
              inputmode="numeric"
              maxlength="1"
              pattern="[0-9]*"
              autocomplete="off"
            />
            <input
              type="text"
              inputmode="numeric"
              maxlength="1"
              pattern="[0-9]*"
              autocomplete="off"
            />
          </div>
          <button type="submit" class="btn-blue btn-sizing">Submit</button>
        </form>
        <p>
          Forgot Your Pin?
          <span class="text-reset"
            ><a href="./forgot-password.html">Reset</a></span
          >
        </p>
      </main>
    </div>
    <div class="right-side">
      <picture>
        <img
          src="../../assets/images/dekstop-enter-pin-picture.png"
          alt="register-picture"
        />
      </picture>
    </div>
  </body>
</html>
