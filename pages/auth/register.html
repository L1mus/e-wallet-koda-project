<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../../styles/register.css" />
  </head>
  <body>
    <div class="left-side">
      <header>
        <img src="../../assets/icons/logo.svg" alt="Logo" />
        <h1 class="title">E-Wallet</h1>
      </header>
      <main>
        <h1 class="heading-1">
          Start Accessing Banking Needs With All Devices and All Platforms With
          30.000+ Users
        </h1>
        <p>
          Transfering money is eassier than ever, you can access Zwallet
          wherever you are. Desktop, laptop, mobile phone? we cover all of that
          for you!
        </p>
        <div class="container-btn-oauth">
          <button class="btn-register">
            <img
              src="../../assets/icons/icon-google.svg "
              alt="icon Facebook"
            />Sign In With Google
          </button>
          <button class="btn-register">
            <img
              src="../../assets/icons/icon-facebook.svg"
              alt="icon Facebook"
            />Sign In With Facebook
          </button>
        </div>
        <form class="form-layout" action="">
          <div class="container-auth">
            <label class="label-input-auth base" for="">Email</label>
            <div class="container-input-auth">
              <img src="../../assets/icons/mail.svg" alt="icon email" />
              <input
                class="input-auth"
                type="email"
                placeholder="Enter Your Email"
              />
            </div>
          </div>
          <div class="container-auth">
            <label class="label-input-auth base" for="">Password</label>
            <div class="container-input-auth">
              <img src="../../assets/icons/password.svg" alt="icon email" />
              <input
                class="input-auth"
                type="email"
                placeholder="Enter Your Password"
              />
              <img src="../../assets/icons/eye-off.svg" alt="icon eyeoff" />
            </div>
          </div>
          <div class="container-auth">
            <label class="label-input-auth base" for="">Confirm Password</label>
            <div class="container-input-auth">
              <img src="../../assets/icons/password.svg" alt="icon email" />
              <input
                class="input-auth"
                type="email"
                placeholder="Enter Your Password Again"
              />
              <img src="../../assets/icons/eye-off.svg" alt="icon eyeoff" />
            </div>
          </div>
          <button class="btn-blue btn-sizing">Register</button>
        </form>
        <p>
          Have An Account? <span class="text-login"><a href="#">Login</a></span>
        </p>
      </main>
    </div>
    <div class="right-side">
      <picture>
        <img
          src="../../assets/images/dekstop-register-picture.png"
          alt="register-picture"
        />
      </picture>
    </div>
  </body>
</html>
