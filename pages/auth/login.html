<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../../styles/login.css" />
  </head>
  <body>
    <div class="left-side">
      <header>
        <img src="../../assets/icons/logo.svg" alt="Logo" />
        <span class="title">E-Wallet</span>
      </header>
      <main>
        <h1 class="heading-1">Hello Welcome Back 👋</h1>
        <p>Fill out the form correctly or you can login with several option.</p>
        <div class="container-btn-oauth">
          <button type="button" class="btn-register">
            <img
              src="../../assets/icons/icon-google.svg "
              alt="icon Facebook"
            />Sign In With Google
          </button>
          <button type="button" class="btn-register">
            <img
              src="../../assets/icons/icon-facebook.svg"
              alt="icon Facebook"
            />Sign In With Facebook
          </button>
        </div>
        <form class="form-layout" action="">
          <div class="container-auth">
            <label class="label-input-auth base" for="login-email">Email</label>
            <div class="container-input-auth">
              <img src="../../assets/icons/mail.svg" alt="icon email" />
              <input
                id="login-email"
                class="input-auth"
                type="email"
                placeholder="Enter Your Email"
                required
              />
            </div>
          </div>
          <div class="container-auth">
            <label class="label-input-auth base" for="login-password"
              >Password</label
            >
            <div class="container-input-auth">
              <img
                src="../../assets/icons/password.svg"
                alt="toggle password visible"
              />
              <input
                id="login-password"
                class="input-auth"
                type="password"
                placeholder="Enter Your Password"
                required
              />
              <img
                src="../../assets/icons/eye-off.svg"
                alt="toggle password visible"
              />
            </div>
          </div>
          <button type="submit" class="btn-blue btn-sizing">Login</button>
        </form>
        <p>
          Have An Account?
          <span class="text-register"
            ><a href="./register.html">Register</a></span
          >
        </p>
      </main>
    </div>
    <div class="right-side">
      <picture>
        <img
          src="../../assets/images/dekstop-login-picture.png"
          alt="register-picture"
        />
      </picture>
    </div>
  </body>
</html>
